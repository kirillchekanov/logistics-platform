const API = {
  async listCompanies() {
    if (!API_BASE) return { companies: STUB_DATA.companies };
    const r = await fetch(`${API_BASE}/companies`);
    return r.json();
  },
  async executeAction(company_id, action, params, dry_run = true) {
    if (!API_BASE) {
      await new Promise(r => setTimeout(r, 600));
      return {
        dry_run, action, company_id, success: true, stub: true,
        data: { shipment_id: `STUB-${company_id.toUpperCase()}-${Date.now()}`,
                tracking_number: `TRK${Math.floor(Math.random()*1000000)}`,
                status: "created", cost_rub: 1850, delivery_days_min: 1, delivery_days_max: 2 },
        will_call: dry_run ? { method: "POST", url: `https://api.${company_id}.ru/v2/shipments` } : null,
        message: dry_run ? "Превью. Вызовите с dry_run=false для реального запроса." : "Выполнено."
      };
    }
    const r = await fetch(`${API_BASE}/execute`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ company_id, action, params, dry_run })
    });
    return r.json();
  },
  async getActionSchema(company_id, action) {
    if (!API_BASE) {
      const schemas = {
        create_shipment: ["from_city","to_city","weight_g","length_cm","width_cm","height_cm","sender_name","sender_phone","recipient_name","recipient_phone"],
        book_pickup: ["shipment_id","pickup_date","time_from","time_to","contact_name","contact_phone"],
        track: ["tracking_number"],
        calculate_cost: ["from_city","to_city","weight_g","length_cm","width_cm","height_cm"],
        cancel: ["shipment_id"],
      };
      return { company_id, action, required_params: schemas[action] || [], stub: true };
    }
    const r = await fetch(`${API_BASE}/schema/${company_id}/${action}`);
    return r.json();
  },
  async getLogs() {
    if (!API_BASE) return { logs: STUB_DATA.logs };
    const r = await fetch(`${API_BASE}/logs`);
    return r.json();
  },
  async registerCompany(config, dry_run = true) {
    if (!API_BASE) {
      await new Promise(r => setTimeout(r, 800));
      return { status: dry_run ? "valid" : "registered", dry_run,
               company_id: config.id, company_name: config.name,
               actions_count: Object.keys(config.actions || {}).length,
               message: dry_run ? "Конфиг валиден. Подтвердите для сохранения." : "Компания добавлена." };
    }
    const r = await fetch(`${API_BASE}/register`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ config_json: JSON.stringify(config), dry_run })
    });
    return r.json();
  }
};

window.API = API;
window.STUB_DATA = STUB_DATA;

const StatusDot = ({ tone = "ok" }) => {
  const map = {
    ok: "#16a34a",
    warn: "#d97706",
    err: "#dc2626",
    idle: "#94a3b8",
    info: "#2563eb",
  };
  return (
    <span
      style={{
        display: "inline-block",
        width: 8,
        height: 8,
        borderRadius: 999,
        background: map[tone] || map.idle,
        boxShadow: `0 0 0 3px ${(map[tone] || map.idle)}22`,
      }}
    />
  );
};

const Badge = ({ tone = "neutral", children, dot = false, mono = false, soft = false }) => {
  const tones = {
    neutral: { bg: "#f1f5f9", fg: "#475569", border: "#e2e8f0" },
    ok: { bg: "#ecfdf5", fg: "#047857", border: "#a7f3d0" },
    warn: { bg: "#fffbeb", fg: "#b45309", border: "#fcd34d" },
    err: { bg: "#fef2f2", fg: "#b91c1c", border: "#fecaca" },
    info: { bg: "#eff6ff", fg: "#1d4ed8", border: "#bfdbfe" },
    accent: { bg: "#f5f3ff", fg: "#5b21b6", border: "#ddd6fe" },
    inverse: { bg: "#0f172a", fg: "#f8fafc", border: "#0f172a" },
  };
  const t = tones[tone] || tones.neutral;
  return (
    <span
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: 6,
        padding: soft ? "2px 8px" : "3px 9px",
        fontSize: 11.5,
        fontWeight: 500,
        lineHeight: 1.4,
        color: t.fg,
        background: t.bg,
        border: soft ? "none" : `1px solid ${t.border}`,
        borderRadius: 6,
        fontFamily: mono ? "var(--mono)" : "inherit",
        letterSpacing: mono ? 0 : 0.1,
      }}
    >
      {dot && <StatusDot tone={tone === "neutral" ? "idle" : tone} />}
      {children}
    </span>
  );
};

const Btn = ({ kind = "secondary", size = "md", icon, iconRight, children, style, full }) => {
  const sizes = {
    sm: { pad: "5px 10px", fs: 12.5, h: 28 },
    md: { pad: "7px 12px", fs: 13, h: 32 },
    lg: { pad: "9px 16px", fs: 13.5, h: 36 },
  };
  const kinds = {
    primary: { bg: "#0f172a", fg: "#f8fafc", border: "#0f172a", shadow: "0 1px 0 #00000010, inset 0 1px 0 #ffffff14" },
    secondary: { bg: "#fff", fg: "#0f172a", border: "#e2e8f0", shadow: "0 1px 0 #0f172a08" },
    ghost: { bg: "transparent", fg: "#475569", border: "transparent", shadow: "none" },
    danger: { bg: "#fff", fg: "#b91c1c", border: "#fecaca", shadow: "0 1px 0 #0f172a08" },
    accent: { bg: "#5b21b6", fg: "#f5f3ff", border: "#5b21b6", shadow: "0 1px 0 #00000010, inset 0 1px 0 #ffffff14" },
  };
  const s = sizes[size];
  const k = kinds[kind];
  return (
    <button
      style={{
        display: "inline-flex",
        alignItems: "center",
        justifyContent: full ? "center" : "flex-start",
        gap: 6,
        padding: s.pad,
        height: s.h,
        fontSize: s.fs,
        fontWeight: 500,
        color: k.fg,
        background: k.bg,
        border: `1px solid ${k.border}`,
        borderRadius: 7,
        boxShadow: k.shadow,
        cursor: "pointer",
        width: full ? "100%" : "auto",
        ...style,
      }}
    >
      {icon && <PortalIcon name={icon} size={14} />}
      {children}
      {iconRight && <PortalIcon name={iconRight} size={14} />}
    </button>
  );
};

          {breadcrumbs.map((c, i) => (
            <React.Fragment key={i}>
              <span style={{ color: i === breadcrumbs.length - 1 ? "var(--ink)" : "var(--muted)" }}>{c}</span>
              {i < breadcrumbs.length - 1 && <PortalIcon name="chevron" size={11} />}
            </React.Fragment>
          ))}
        </div>
      )}
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <h1 style={{ fontSize: 18, fontWeight: 600, color: "var(--ink)", letterSpacing: -0.2, margin: 0 }}>{title}</h1>
        {sub}
      </div>
    </div>
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <div
        style={{
          display: "flex",
          alignItems: "center",
          gap: 6,
          padding: "5px 10px",
          background: "var(--surface-2)",
          border: "1px solid var(--line)",
          borderRadius: 7,
          color: "var(--muted)",
          fontSize: 12,
          width: 220,
        }}
      >
        <PortalIcon name="search" size={13} />
        <span style={{ flex: 1 }}>Search actions, logs…</span>
        <span style={{ fontFamily: "var(--mono)", fontSize: 10.5, color: "var(--muted)", padding: "1px 5px", border: "1px solid var(--line)", borderRadius: 3, background: "#fff" }}>⌘K</span>
      </div>
      {actions}
    </div>
  </div>
);

const Card = ({ title, subtitle, children, right, padded = true, style }) => (
  <section
    style={{
      background: "#fff",
      border: "1px solid var(--line)",
      borderRadius: 10,
      boxShadow: "0 1px 0 #0f172a05",
      overflow: "hidden",
      ...style,
    }}
  >
    {(title || right) && (
      <header
        style={{
          display: "flex",
          alignItems: "center",
          padding: "12px 16px",
          borderBottom: "1px solid var(--line)",
          gap: 12,
        }}
      >
        <div style={{ flex: 1 }}>
          {title && <div style={{ fontSize: 13, fontWeight: 600, color: "var(--ink)" }}>{title}</div>}
          {subtitle && <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 1 }}>{subtitle}</div>}
        </div>
        {right}
      </header>
    )}
    <div style={{ padding: padded ? 16 : 0 }}>{children}</div>
  </section>
);

const Field = ({ label, hint, children, required, mono, full }) => (
  <label style={{ display: "flex", flexDirection: "column", gap: 6, gridColumn: full ? "1 / -1" : "auto" }}>
    <span style={{ fontSize: 12, fontWeight: 500, color: "var(--ink)", display: "flex", justifyContent: "space-between" }}>
      <span>
        {label}
        {required && <span style={{ color: "#b91c1c", marginLeft: 3 }}>*</span>}
      </span>
      {hint && <span style={{ color: "var(--muted)", fontWeight: 400, fontSize: 11.5 }}>{hint}</span>}
    </span>
    {children}
  </label>
);

const Input = ({ value, placeholder, mono, prefix, suffix, readOnly }) => (
  <div
    style={{
      display: "flex",
      alignItems: "stretch",
      background: readOnly ? "var(--surface-2)" : "#fff",
      border: "1px solid var(--line)",
      borderRadius: 7,
      overflow: "hidden",
      height: 32,
      fontSize: 12.5,
    }}
  >
    {prefix && (
      <span
        style={{
          display: "flex",
          alignItems: "center",
          padding: "0 10px",
          background: "var(--surface-2)",
          color: "var(--muted)",
          fontSize: 12,
          borderRight: "1px solid var(--line)",
          fontFamily: mono ? "var(--mono)" : "inherit",
        }}
      >
        {prefix}
      </span>
    )}
    <span
      style={{
        flex: 1,
        display: "flex",
        alignItems: "center",
        padding: "0 10px",
        color: value ? "var(--ink)" : "var(--muted)",
        fontFamily: mono ? "var(--mono)" : "inherit",
        fontSize: mono ? 12 : 12.5,
      }}
    >
      {value || placeholder}
    </span>
    {suffix && (
      <span
        style={{
          display: "flex",
          alignItems: "center",
          padding: "0 8px",
          color: "var(--muted)",
          borderLeft: "1px solid var(--line)",
          background: "var(--surface-2)",
          fontSize: 11.5,
        }}
      >
        {suffix}
      </span>
    )}
  </div>
);

const Select = ({ value }) => (
  <div
    style={{
      display: "flex",
      alignItems: "center",
      padding: "0 10px",
      background: "#fff",
      border: "1px solid var(--line)",
      borderRadius: 7,
      height: 32,
      fontSize: 12.5,
      color: "var(--ink)",
    }}
  >
    <span style={{ flex: 1 }}>{value}</span>
    <PortalIcon name="chevronDown" size={13} />
  </div>
);

const MethodTag = ({ method }) => {
  const map = {
    GET: { bg: "#eff6ff", fg: "#1d4ed8" },
    POST: { bg: "#ecfdf5", fg: "#047857" },
    PUT: { bg: "#fffbeb", fg: "#b45309" },
    PATCH: { bg: "#fef3c7", fg: "#92400e" },
    DELETE: { bg: "#fef2f2", fg: "#b91c1c" },
  };
  const t = map[method] || map.GET;
  return (
    <span
      style={{
        display: "inline-flex",
        padding: "1px 6px",
        fontSize: 10.5,
        fontWeight: 700,
        fontFamily: "var(--mono)",
        letterSpacing: 0.4,
        color: t.fg,
        background: t.bg,
        borderRadius: 4,
        minWidth: 44,
        justifyContent: "center",
      }}
    >
      {method}
    </span>
  );
};

const StatusCode = ({ code }) => {
  const c = parseInt(code, 10);
  let tone = "ok";
  if (c >= 500) tone = "err";
  else if (c >= 400) tone = "err";
  else if (c >= 300) tone = "warn";
  return <Badge tone={tone} mono>{code}</Badge>;
};

// expose
Object.assign(window, {
  PortalIcon, StatusDot, Badge, Btn, Sidebar, Topbar, Card, Field, Input, Select, MethodTag, StatusCode,
});

  </script>
  <script type="text/babel">

const { useState, useEffect, useCallback } = React;

// ── Живой тест действия ────────────────────────────────────────────────────
const ActionTester = ({ companyId, actionName, onClose }) => {
  const [schema, setSchema] = useState(null);
  const [params, setParams] = useState({});
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [dryRun, setDryRun] = useState(true);

  useEffect(() => {
    API.getActionSchema(companyId, actionName).then(s => {
      setSchema(s);
      const defaults = {};
      (s.required_params || []).forEach(p => {
        const d = { from_city: "Самара", to_city: "Москва", weight_g: "5000",
                    length_cm: "30", width_cm: "20", height_cm: "15",
                    sender_name: "Иван Петров", sender_phone: "+79991234567",
                    recipient_name: "Пётр Иванов", recipient_phone: "+79997654321",
                    pickup_date: new Date().toISOString().slice(0,10),
                    time_from: "10:00", time_to: "16:00",
                    contact_name: "Иван Петров", contact_phone: "+79991234567",
                    tracking_number: "TRK123456", shipment_id: "STUB-001" };
        defaults[p] = d[p] || "";
      });
      setParams(defaults);
    });
  }, [companyId, actionName]);

  const run = async () => {
    setLoading(true);
    setResult(null);
    try {
      const r = await API.executeAction(companyId, actionName, params, dryRun);
      setResult(r);
    } catch(e) {
      setResult({ success: false, error: e.message });
    }
    setLoading(false);
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(15,23,42,0.55)", display:"flex",
                  alignItems:"center", justifyContent:"center", zIndex:1000 }}
         onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background:"#fff", borderRadius:12, width:640, maxHeight:"85vh",
                    overflow:"auto", border:"1px solid #e2e8f0", boxShadow:"0 24px 48px rgba(15,23,42,0.18)" }}>
        <div style={{ padding:"16px 20px", borderBottom:"1px solid #e2e8f0", display:"flex",
                      alignItems:"center", justifyContent:"space-between" }}>
          <div>
            <div style={{ fontSize:14, fontWeight:600, color:"#0f172a" }}>
              Тест: <span style={{ fontFamily:"var(--mono)", color:"#5b21b6" }}>{actionName}</span>
            </div>
            <div style={{ fontSize:12, color:"#64748b", marginTop:2 }}>
              Компания: {companyId} {result?.stub && <span style={{ color:"#d97706" }}>· stub-режим</span>}
            </div>
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", cursor:"pointer",
                          color:"#64748b", fontSize:18 }}>×</button>
        </div>

        <div style={{ padding:"16px 20px" }}>
          {schema && (
            <div style={{ marginBottom:16 }}>
              <div style={{ fontSize:11, fontWeight:600, color:"#64748b", textTransform:"uppercase",
                            letterSpacing:0.5, marginBottom:8 }}>Параметры</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                {(schema.required_params || []).map(p => (
                  <div key={p}>
                    <label style={{ fontSize:11, color:"#64748b", display:"block", marginBottom:3,
                                    fontFamily:"var(--mono)" }}>{p}</label>
                    <input value={params[p] || ""} onChange={e => setParams({...params, [p]: e.target.value})}
                           style={{ width:"100%", fontSize:12, fontFamily:"var(--mono)", padding:"5px 8px",
                                    border:"1px solid #e2e8f0", borderRadius:6, background:"#f7f8fa",
                                    color:"#0f172a" }} />
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:14 }}>
            <label style={{ display:"flex", alignItems:"center", gap:6, fontSize:13, color:"#0f172a",
                            cursor:"pointer" }}>
              <input type="checkbox" checked={dryRun} onChange={e => setDryRun(e.target.checked)} />
              dry_run (превью без реального вызова)
            </label>
          </div>

          <button onClick={run} disabled={loading}
                  style={{ width:"100%", padding:"9px 0", background:"#0f172a", color:"#fff",
                           border:"none", borderRadius:7, fontSize:13, fontWeight:600,
                           cursor:loading?"not-allowed":"pointer", opacity:loading?0.7:1 }}>
            {loading ? "Выполняется..." : dryRun ? "Превью запроса" : "Выполнить"}
          </button>

          {result && (
            <div style={{ marginTop:14, borderRadius:8, overflow:"hidden", border:"1px solid #e2e8f0" }}>
              <div style={{ padding:"8px 12px", background: result.success ? "#ecfdf5" : "#fef2f2",
                            borderBottom:"1px solid #e2e8f0", display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:13, fontWeight:600,
                               color: result.success ? "#047857" : "#b91c1c" }}>
                  {result.success ? (result.dry_run ? "Превью готово" : "Выполнено") : "Ошибка"}
                </span>
                {result.stub && <span style={{ fontSize:11, color:"#d97706", background:"#fffbeb",
                                              padding:"2px 7px", borderRadius:4, border:"1px solid #fcd34d" }}>stub</span>}
              </div>
              <pre style={{ margin:0, padding:"12px 14px", background:"#0b1220", color:"#e2e8f0",
                            fontFamily:"var(--mono)", fontSize:11.5, lineHeight:1.6,
                            whiteSpace:"pre-wrap", wordBreak:"break-all" }}>
                {JSON.stringify(result, null, 2)}
              </pre>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ── Онбординг с живым validate ─────────────────────────────────────────────
const LiveWizard = ({ onDone }) => {
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({
    id: "", name: "", display_name: "", base_url: "",
    token_url: "", client_id: "", client_secret: "", scope: "shipment:create shipment:read",
    actions: { create_shipment: { method:"POST", path:"/orders" },
               book_pickup: { method:"POST", path:"/pickups" },
               track: { method:"GET", path:"/orders/{{tracking_number}}" },
               calculate_cost: { method:"POST", path:"/calculator" },
               cancel: { method:"DELETE", path:"/orders/{{shipment_id}}" } },
    response_map: { "create_shipment.shipment_id": "data.id",
                    "create_shipment.tracking_number": "data.tracking",
                    "track.status": "data.status.name",
                    "calculate_cost.cost_rub": "data.total" }
  });
  const [validating, setValidating] = useState(false);
  const [preview, setPreview] = useState(null);

  const validate = async () => {
    setValidating(true);
    const config = {
      id: form.id || "new_partner",
      name: form.name,
      display_name: form.display_name,
      base_url: form.base_url,
      auth: { type:"oauth2_client_credentials", token_url: form.token_url,
              client_id_env: "PARTNER_CLIENT_ID", client_secret_env: "PARTNER_CLIENT_SECRET",
              scope: form.scope, token_ttl_seconds: 3600 },
      actions: Object.fromEntries(Object.entries(form.actions).map(([k,v]) => [k, {
        method: v.method, path: v.path,
        response_map: Object.fromEntries(
          Object.entries(form.response_map).filter(([rk]) => rk.startsWith(k+"."))
          .map(([rk, rv]) => [rk.replace(k+".",""), rv])
        )
      }]))
    };
    const result = await API.registerCompany(config, true);
    setPreview({ config, result });
    setValidating(false);
    if (result.status === "valid") setStep(4);
  };

  const save = async () => {
    if (!preview) return;
    const result = await API.registerCompany(preview.config, false);
    if (result.status === "registered") onDone(preview.config);
  };

  const inp = (key, placeholder, mono=false) => (
    <input value={form[key]} onChange={e => setForm({...form, [key]: e.target.value})}
           placeholder={placeholder}
           style={{ width:"100%", fontSize:13, fontFamily: mono?"var(--mono)":"inherit",
                    padding:"7px 10px", border:"1px solid #e2e8f0", borderRadius:7,
                    background:"#f7f8fa", color:"#0f172a" }} />
  );

  const steps = ["Компания","OAuth","Действия","Маппинг","Готово"];

  return (
    <div style={{ padding:28, maxWidth:720, margin:"0 auto" }}>
      <div style={{ display:"flex", gap:0, marginBottom:28, background:"#fff",
                    border:"1px solid #e2e8f0", borderRadius:10, overflow:"hidden" }}>
        {steps.map((s,i) => (
          <div key={s} style={{ flex:1, padding:"10px 4px", textAlign:"center",
                                fontSize:11.5, fontWeight: i<=step?600:400,
                                color: i<step?"#047857": i===step?"#0f172a":"#94a3b8",
                                background: i===step?"#f8f7ff": i<step?"#ecfdf5":"#fff",
                                borderRight: i<4?"1px solid #e2e8f0":"none" }}>
            {i < step ? "✓ " : ""}{s}
          </div>
        ))}
      </div>

      {step === 0 && (
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <div>
            <label style={{ fontSize:12, color:"#64748b", display:"block", marginBottom:4 }}>Системный ID компании</label>
            {inp("id","my_company","mono")}
          </div>
          <div>
            <label style={{ fontSize:12, color:"#64748b", display:"block", marginBottom:4 }}>Название компании</label>
            {inp("name","Моя Логистика")}
          </div>
          <div>
            <label style={{ fontSize:12, color:"#64748b", display:"block", marginBottom:4 }}>Как называть клиентам платформы</label>
            {inp("display_name","партнёр по доставке")}
          </div>
          <div>
            <label style={{ fontSize:12, color:"#64748b", display:"block", marginBottom:4 }}>Base URL вашего API</label>
            {inp("base_url","https://api.yourcompany.ru/v2","mono")}
          </div>
          <button onClick={() => setStep(1)}
                  style={{ alignSelf:"flex-end", padding:"8px 20px", background:"#0f172a",
                           color:"#fff", border:"none", borderRadius:7, fontSize:13,
                           fontWeight:600, cursor:"pointer" }}>Далее →</button>
        </div>
      )}

      {step === 1 && (
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <div style={{ padding:"10px 14px", background:"#fffbeb", border:"1px solid #fcd34d",
                        borderRadius:8, fontSize:12, color:"#92400e" }}>
            Мы получим только те разрешения которые вы укажете в scope.
            Вы можете отозвать доступ в любой момент.
          </div>
          <div>
            <label style={{ fontSize:12, color:"#64748b", display:"block", marginBottom:4 }}>URL для получения токена</label>
            {inp("token_url","https://api.yourcompany.ru/oauth/token","mono")}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <div>
              <label style={{ fontSize:12, color:"#64748b", display:"block", marginBottom:4 }}>Client ID</label>
              {inp("client_id","your_client_id","mono")}
            </div>
            <div>
              <label style={{ fontSize:12, color:"#64748b", display:"block", marginBottom:4 }}>Client Secret</label>
              <input type="password" value={form.client_secret}
                     onChange={e => setForm({...form, client_secret: e.target.value})}
                     placeholder="••••••••"
                     style={{ width:"100%", fontSize:13, padding:"7px 10px",
                              border:"1px solid #e2e8f0", borderRadius:7,
                              background:"#f7f8fa", color:"#0f172a" }} />
            </div>
          </div>
          <div>
            <label style={{ fontSize:12, color:"#64748b", display:"block", marginBottom:4 }}>Scope (через пробел)</label>
            {inp("scope","shipment:create shipment:read","mono")}
          </div>
          <div style={{ display:"flex", justifyContent:"space-between" }}>
            <button onClick={() => setStep(0)} style={{ padding:"8px 16px", background:"none",
                    border:"1px solid #e2e8f0", borderRadius:7, cursor:"pointer", fontSize:13 }}>← Назад</button>
            <button onClick={() => setStep(2)} style={{ padding:"8px 20px", background:"#0f172a",
                    color:"#fff", border:"none", borderRadius:7, fontSize:13, fontWeight:600, cursor:"pointer" }}>Далее →</button>
          </div>
        </div>
      )}

      {step === 2 && (
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          <div style={{ fontSize:12, color:"#64748b", marginBottom:4 }}>
            Укажите HTTP метод и путь для каждого действия
          </div>
          {Object.entries(form.actions).map(([action, cfg]) => (
            <div key={action} style={{ display:"grid", gridTemplateColumns:"180px 90px 1fr",
                                       gap:8, alignItems:"center" }}>
              <span style={{ fontFamily:"var(--mono)", fontSize:12.5, color:"#0f172a",
                             fontWeight:500 }}>{action}</span>
              <select value={cfg.method}
                      onChange={e => setForm({...form, actions:{...form.actions,
                        [action]:{...cfg, method:e.target.value}}})}
                      style={{ fontSize:12, padding:"6px 8px", border:"1px solid #e2e8f0",
                               borderRadius:6, background:"#f7f8fa", color:"#0f172a" }}>
                {["GET","POST","PUT","DELETE"].map(m => <option key={m}>{m}</option>)}
              </select>
              <input value={cfg.path}
                     onChange={e => setForm({...form, actions:{...form.actions,
                       [action]:{...cfg, path:e.target.value}}})}
                     style={{ fontSize:12, fontFamily:"var(--mono)", padding:"6px 10px",
                              border:"1px solid #e2e8f0", borderRadius:6,
                              background:"#f7f8fa", color:"#0f172a" }} />
            </div>
          ))}
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:8 }}>
            <button onClick={() => setStep(1)} style={{ padding:"8px 16px", background:"none",
                    border:"1px solid #e2e8f0", borderRadius:7, cursor:"pointer", fontSize:13 }}>← Назад</button>
            <button onClick={() => setStep(3)} style={{ padding:"8px 20px", background:"#0f172a",
                    color:"#fff", border:"none", borderRadius:7, fontSize:13, fontWeight:600, cursor:"pointer" }}>Далее →</button>
          </div>
        </div>
      )}

      {step === 3 && (
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          <div style={{ fontSize:12, color:"#64748b", marginBottom:4 }}>
            Укажите dot-path для ключевых полей ответа (например: <code style={{ fontFamily:"var(--mono)" }}>data.order.id</code>)
          </div>
          {Object.entries(form.response_map).map(([field, path]) => (
            <div key={field} style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, alignItems:"center" }}>
              <span style={{ fontFamily:"var(--mono)", fontSize:12, color:"#5b21b6",
                             fontWeight:500 }}>{field}</span>
              <input value={path}
                     onChange={e => setForm({...form, response_map:{...form.response_map, [field]:e.target.value}})}
                     style={{ fontSize:12, fontFamily:"var(--mono)", padding:"6px 10px",
                              border:"1px solid #e2e8f0", borderRadius:6,
                              background:"#f7f8fa", color:"#0f172a" }} />
            </div>
          ))}
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:8 }}>
            <button onClick={() => setStep(2)} style={{ padding:"8px 16px", background:"none",
                    border:"1px solid #e2e8f0", borderRadius:7, cursor:"pointer", fontSize:13 }}>← Назад</button>
            <button onClick={validate} disabled={validating}
                    style={{ padding:"8px 20px", background:"#5b21b6",
                    color:"#fff", border:"none", borderRadius:7, fontSize:13, fontWeight:600,
                    cursor:validating?"not-allowed":"pointer", opacity:validating?0.7:1 }}>
              {validating ? "Проверяем..." : "Проверить и сохранить"}
            </button>
          </div>
        </div>
      )}

      {step === 4 && preview && (
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <div style={{ padding:"12px 16px", background:"#ecfdf5", border:"1px solid #a7f3d0",
                        borderRadius:8, fontSize:13, color:"#047857", fontWeight:500 }}>
            ✓ Конфиг валиден — {preview.result.actions_count} действий настроено
          </div>
          <div style={{ borderRadius:8, overflow:"hidden", border:"1px solid #e2e8f0" }}>
            <div style={{ padding:"8px 14px", background:"#0b1220", fontSize:11,
                          color:"#64748b", fontFamily:"var(--mono)" }}>Сгенерированный конфиг адаптера</div>
            <pre style={{ margin:0, padding:"12px 14px", background:"#0b1220", color:"#e2e8f0",
                          fontFamily:"var(--mono)", fontSize:11, lineHeight:1.6,
                          whiteSpace:"pre-wrap", maxHeight:240, overflow:"auto" }}>
              {JSON.stringify(preview.config, null, 2)}
            </pre>
          </div>
          <button onClick={save}
                  style={{ padding:"10px 0", background:"#0f172a", color:"#fff",
                           border:"none", borderRadius:7, fontSize:13, fontWeight:600,
                           cursor:"pointer" }}>
            Подключить компанию
          </button>
        </div>
      )}
    </div>
  );
};

// ── Главное приложение ─────────────────────────────────────────────────────
const PortalApp = () => {
  const [screen, setScreen] = useState("overview");
  const [companies, setCompanies] = useState(STUB_DATA.companies);
  const [activeCompany, setActiveCompany] = useState(STUB_DATA.companies[0]);
  const [tester, setTester] = useState(null);
  const [showWizard, setShowWizard] = useState(false);
  const [logs, setLogs] = useState(STUB_DATA.logs);

  const onCompanyAdded = (config) => {
    const newCo = { id: config.id, name: config.name,
                    display_name: config.display_name, status: "active",
                    actions: Object.keys(config.actions), calls_today: 0,
                    uptime: "—", token_ttl: "—" };
    setCompanies([...companies, newCo]);
    setActiveCompany(newCo);
    setShowWizard(false);
    setScreen("overview");
  };

  // Sidebar навигация
  const sidebarItems = [
    { id:"overview", label:"Обзор", icon:"home" },
    { id:"wizard",   label:"Подключить", icon:"plus" },
    { id:"actions",  label:"Действия API", icon:"lightning" },
    { id:"credentials", label:"Доступы", icon:"key" },
    { id:"logs",     label:"Логи", icon:"logs" },
  ];

  return (
    <div style={{ display:"flex", height:"100vh", background:"#f7f8fa",
                  fontFamily:"var(--sans)", color:"#0f172a" }}>

      {/* Sidebar */}
      <aside style={{ width:220, background:"#0f172a", display:"flex",
                      flexDirection:"column", flexShrink:0 }}>
        <div style={{ padding:"20px 16px 16px", borderBottom:"1px solid #1e293b" }}>
          <div style={{ fontSize:13, fontWeight:700, color:"#fff",
                        fontFamily:"var(--mono)", letterSpacing:-0.3 }}>
            logistics.api
          </div>
          <div style={{ fontSize:11, color:"#475569", marginTop:2 }}>Partner Portal</div>
        </div>

        {/* Company switcher */}
        <div style={{ padding:"12px 8px 8px" }}>
          <div style={{ fontSize:10, fontWeight:600, color:"#475569", textTransform:"uppercase",
                        letterSpacing:0.5, padding:"0 8px", marginBottom:6 }}>Партнёры</div>
          {companies.map(co => (
            <div key={co.id} onClick={() => { setActiveCompany(co); setScreen("overview"); }}
                 style={{ padding:"7px 10px", borderRadius:6, cursor:"pointer", marginBottom:2,
                          background: activeCompany.id===co.id ? "#1e293b" : "transparent",
                          display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ width:6, height:6, borderRadius:999, flexShrink:0,
                             background: co.status==="active"?"#16a34a":co.status==="configuring"?"#d97706":"#dc2626" }} />
              <span style={{ fontSize:12.5, color: activeCompany.id===co.id?"#fff":"#94a3b8",
                             fontWeight: activeCompany.id===co.id?500:400, overflow:"hidden",
                             textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                {co.name}
              </span>
            </div>
          ))}
          <button onClick={() => setShowWizard(true)}
                  style={{ width:"100%", padding:"7px 10px", background:"transparent",
                           border:"1px dashed #334155", borderRadius:6, color:"#64748b",
                           fontSize:12, cursor:"pointer", textAlign:"left", marginTop:4 }}>
            + Добавить партнёра
          </button>
        </div>

        <div style={{ flex:1, borderTop:"1px solid #1e293b", padding:"12px 8px" }}>
          {sidebarItems.filter(i=>i.id!=="wizard").map(item => (
            <div key={item.id} onClick={() => setScreen(item.id)}
                 style={{ padding:"8px 10px", borderRadius:6, cursor:"pointer", marginBottom:2,
                          background: screen===item.id?"#1e293b":"transparent",
                          display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ color: screen===item.id?"#a78bfa":"#475569", flexShrink:0 }}>
                <PortalIcon name={item.icon} size={15} />
              </span>
              <span style={{ fontSize:12.5, color: screen===item.id?"#fff":"#94a3b8",
                             fontWeight: screen===item.id?500:400 }}>
                {item.label}
              </span>
            </div>
          ))}
        </div>
      </aside>

      {/* Main */}
      <main style={{ flex:1, overflow:"auto", display:"flex", flexDirection:"column" }}>
        {/* Topbar */}
        <div style={{ padding:"14px 24px", borderBottom:"1px solid #e2e8f0", background:"#fff",
                      display:"flex", alignItems:"center", gap:12, flexShrink:0 }}>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:14, fontWeight:600, color:"#0f172a" }}>
              {activeCompany.name}
            </div>
            <div style={{ fontSize:11.5, color:"#64748b", marginTop:1, fontFamily:"var(--mono)" }}>
              {activeCompany.id} · {activeCompany.calls_today.toLocaleString()} вызовов сегодня
            </div>
          </div>
          <span style={{ display:"inline-flex", alignItems:"center", gap:6, fontSize:12,
                         padding:"4px 10px", borderRadius:999,
                         background: activeCompany.status==="active"?"#ecfdf5":"#fffbeb",
                         color: activeCompany.status==="active"?"#047857":"#d97706",
                         border: activeCompany.status==="active"?"1px solid #a7f3d0":"1px solid #fcd34d" }}>
            <span style={{ width:6, height:6, borderRadius:999,
                           background: activeCompany.status==="active"?"#16a34a":"#d97706" }} />
            {activeCompany.status==="active"?"подключён":"настройка"}
          </span>
        </div>

        {/* Content */}
        <div style={{ flex:1 }}>
          {screen==="overview" && (
            <div style={{ padding:24 }}>
              {/* Stats */}
              <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:14, marginBottom:20 }}>
                {[
                  { label:"Статус", value:"Operational", sub:"Нет инцидентов 30 дней", color:"#16a34a" },
                  { label:"Действий", value:`${activeCompany.actions?.length || 0} / 7`,
                    sub:`${7-(activeCompany.actions?.length||0)} не настроено`, color:"#5b21b6" },
                  { label:"Вызовов сегодня", value:activeCompany.calls_today.toLocaleString(),
                    sub:"обновлено только что", color:"#2563eb" },
                ].map(s => (
                  <div key={s.label} style={{ background:"#fff", border:"1px solid #e2e8f0",
                                              borderRadius:10, padding:"14px 16px", position:"relative",
                                              overflow:"hidden" }}>
                    <div style={{ position:"absolute", left:0, top:0, bottom:0, width:3, background:s.color }} />
                    <div style={{ fontSize:11, fontWeight:600, color:"#64748b", textTransform:"uppercase",
                                  letterSpacing:0.5, marginBottom:8 }}>{s.label}</div>
                    <div style={{ fontSize:24, fontWeight:600, color:"#0f172a", marginBottom:4 }}>{s.value}</div>
                    <div style={{ fontSize:12, color:"#64748b" }}>{s.sub}</div>
                  </div>
                ))}
              </div>

              {/* Actions table */}
              <div style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:10, overflow:"hidden" }}>
                <div style={{ padding:"14px 16px", borderBottom:"1px solid #e2e8f0", display:"flex",
                              alignItems:"center", justifyContent:"space-between" }}>
                  <div style={{ fontSize:13, fontWeight:600 }}>Настроенные действия</div>
                  <button onClick={() => setScreen("actions")}
                          style={{ fontSize:12, padding:"5px 12px", background:"none",
                                   border:"1px solid #e2e8f0", borderRadius:6, cursor:"pointer", color:"#475569" }}>
                    Настроить →
                  </button>
                </div>
                {(activeCompany.actions||[]).map((a,i) => (
                  <div key={a} style={{ padding:"11px 16px", borderBottom: i<(activeCompany.actions.length-1)?"1px solid #f1f5f9":"none",
                                        display:"flex", alignItems:"center", gap:12 }}>
                    <span style={{ fontFamily:"var(--mono)", fontSize:13, color:"#0f172a", flex:1 }}>{a}</span>
                    <span style={{ fontSize:11, padding:"3px 8px", borderRadius:999,
                                   background:"#ecfdf5", color:"#047857", border:"1px solid #a7f3d0" }}>
                      ● работает
                    </span>
                    <button onClick={() => setTester({ company: activeCompany.id, action: a })}
                            style={{ fontSize:11, padding:"4px 10px", background:"none",
                                     border:"1px solid #e2e8f0", borderRadius:6, cursor:"pointer", color:"#5b21b6" }}>
                      Тест
                    </button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {screen==="actions" && (
            <div style={{ padding:24 }}>
              <div style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:10, overflow:"hidden" }}>
                <div style={{ padding:"14px 16px", borderBottom:"1px solid #e2e8f0" }}>
                  <div style={{ fontSize:13, fontWeight:600 }}>Действия API</div>
                  <div style={{ fontSize:12, color:"#64748b", marginTop:2 }}>Нажмите «Тест» для проверки каждого действия</div>
                </div>
                {["create_shipment","book_pickup","track","calculate_cost","cancel","create_reception","get_slots"].map((a,i,arr) => {
                  const configured = (activeCompany.actions||[]).includes(a);
                  return (
                    <div key={a} style={{ padding:"12px 16px", borderBottom:i<arr.length-1?"1px solid #f1f5f9":"none",
                                          display:"flex", alignItems:"center", gap:12 }}>
                      <span style={{ fontFamily:"var(--mono)", fontSize:13, fontWeight:500,
                                     color:"#0f172a", flex:1 }}>{a}</span>
                      <span style={{ fontSize:11, padding:"3px 8px", borderRadius:999,
                                     background:configured?"#ecfdf5":"#f8fafc",
                                     color:configured?"#047857":"#94a3b8",
                                     border:configured?"1px solid #a7f3d0":"1px solid #e2e8f0" }}>
                        {configured ? "● настроено" : "○ не настроено"}
                      </span>
                      {configured && (
                        <button onClick={() => setTester({ company: activeCompany.id, action: a })}
                                style={{ fontSize:12, padding:"5px 12px", background:"#5b21b6",
                                         color:"#fff", border:"none", borderRadius:6, cursor:"pointer" }}>
                          Тест
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {screen==="credentials" && (
            <div style={{ padding:24 }}>
              <div style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:10,
                            overflow:"hidden", marginBottom:14 }}>
                <div style={{ padding:"14px 16px", borderBottom:"1px solid #e2e8f0",
                              display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div style={{ fontSize:13, fontWeight:600 }}>OAuth credentials</div>
                  <span style={{ fontSize:11, padding:"3px 8px", borderRadius:999,
                                 background:"#ecfdf5", color:"#047857", border:"1px solid #a7f3d0" }}>активны</span>
                </div>
                {[
                  ["Client ID", `${activeCompany.id}_client_****`],
                  ["Token URL", `https://api.${activeCompany.id}.ru/oauth/token`],
                  ["Scope", "shipment:create shipment:read"],
                  ["Токен истекает", activeCompany.token_ttl],
                ].map(([label, value]) => (
                  <div key={label} style={{ padding:"11px 16px", borderBottom:"1px solid #f1f5f9",
                                            display:"flex", alignItems:"center", gap:12 }}>
                    <span style={{ fontSize:12, color:"#64748b", width:140, flexShrink:0 }}>{label}</span>
                    <span style={{ fontFamily:"var(--mono)", fontSize:12.5, color:"#0f172a", flex:1 }}>{value}</span>
                  </div>
                ))}
                <div style={{ padding:"12px 16px", display:"flex", gap:8 }}>
                  <button style={{ fontSize:12, padding:"6px 14px", background:"none",
                                   border:"1px solid #e2e8f0", borderRadius:6, cursor:"pointer" }}>
                    Обновить токен
                  </button>
                  <button style={{ fontSize:12, padding:"6px 14px", background:"none",
                                   border:"1px solid #fca5a5", borderRadius:6, cursor:"pointer", color:"#b91c1c" }}>
                    Отозвать доступ
                  </button>
                </div>
              </div>

              <div style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:10, overflow:"hidden" }}>
                <div style={{ padding:"14px 16px", borderBottom:"1px solid #e2e8f0",
                              fontSize:13, fontWeight:600 }}>Разрешения (scope)</div>
                {[
                  ["shipment:create","разрешено","ok"],
                  ["shipment:read","разрешено","ok"],
                  ["pickup:create","разрешено","ok"],
                  ["shipment:delete","не запрошено","—"],
                  ["finance:read","не запрошено","—"],
                  ["admin:*","не запрошено","—"],
                ].map(([scope, status, tone]) => (
                  <div key={scope} style={{ padding:"10px 16px", borderBottom:"1px solid #f1f5f9",
                                            display:"flex", alignItems:"center", gap:12 }}>
                    <span style={{ fontFamily:"var(--mono)", fontSize:12.5, color:"#0f172a", flex:1 }}>{scope}</span>
                    <span style={{ fontSize:11, padding:"3px 8px", borderRadius:999,
                                   background:tone==="ok"?"#ecfdf5":"#f8fafc",
                                   color:tone==="ok"?"#047857":"#94a3b8",
                                   border:tone==="ok"?"1px solid #a7f3d0":"1px solid #e2e8f0" }}>
                      {status}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {screen==="logs" && (
            <div style={{ padding:24 }}>
              <div style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:10,
                            overflow:"hidden", marginBottom:14 }}>
                <div style={{ padding:"14px 16px", borderBottom:"1px solid #e2e8f0",
                              fontSize:13, fontWeight:600 }}>Последние вызовы</div>
                <div style={{ padding:"8px 16px", background:"#f8fafc", borderBottom:"1px solid #e2e8f0",
                              display:"grid", gridTemplateColumns:"80px 1fr 120px 60px 80px",
                              gap:12, fontSize:10.5, fontWeight:600, color:"#64748b",
                              textTransform:"uppercase", letterSpacing:0.5 }}>
                  <div>Время</div><div>Действие</div><div>Компания</div><div>Статус</div><div>Латентность</div>
                </div>
                {logs.map(log => (
                  <div key={log.id} style={{ padding:"10px 16px", borderBottom:"1px solid #f1f5f9",
                                             display:"grid", gridTemplateColumns:"80px 1fr 120px 60px 80px",
                                             gap:12, alignItems:"center" }}>
                    <span style={{ fontFamily:"var(--mono)", fontSize:12, color:"#64748b" }}>{log.time}</span>
                    <span style={{ fontFamily:"var(--mono)", fontSize:12.5, color:"#0f172a", fontWeight:500 }}>{log.action}</span>
                    <span style={{ fontSize:12, color:"#475569" }}>{log.company}</span>
                    <span style={{ fontSize:12, fontFamily:"var(--mono)",
                                   color:log.ok?"#047857":"#b91c1c", fontWeight:600 }}>{log.status}</span>
                    <span style={{ fontFamily:"var(--mono)", fontSize:12,
                                   color:log.latency>400?"#d97706":"#475569" }}>{log.latency}ms</span>
                  </div>
                ))}
              </div>

              {logs.find(l => !l.ok) && (
                <div style={{ background:"#fff", border:"1px solid #fca5a5", borderRadius:10, overflow:"hidden" }}>
                  <div style={{ padding:"12px 16px", background:"#fef2f2", borderBottom:"1px solid #fca5a5",
                                display:"flex", alignItems:"center", gap:10 }}>
                    <span style={{ fontSize:13, fontWeight:600, color:"#b91c1c" }}>Ошибка 422 · validation_error</span>
                    <span style={{ fontSize:12, color:"#dc2626", fontFamily:"var(--mono)" }}>
                      {logs.find(l=>!l.ok)?.action} · {logs.find(l=>!l.ok)?.company}
                    </span>
                  </div>
                  <div style={{ padding:"14px 16px" }}>
                    <pre style={{ margin:0, padding:"10px 12px", background:"#0b1220", color:"#e2e8f0",
                                  fontFamily:"var(--mono)", fontSize:11.5, borderRadius:8,
                                  lineHeight:1.6, whiteSpace:"pre-wrap", marginBottom:10 }}>
                      {JSON.stringify(logs.find(l=>!l.ok)?.error, null, 2)}
                    </pre>
                    <div style={{ fontSize:12.5, color:"#475569" }}>
                      <span style={{ fontWeight:600, color:"#0f172a" }}>Как исправить: </span>
                      {logs.find(l=>!l.ok)?.error?.fix}
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </main>

      {/* Action tester modal */}
      {tester && (
        <ActionTester companyId={tester.company} actionName={tester.action}
                      onClose={() => setTester(null)} />
      )}

      {/* Wizard modal */}
      {showWizard && (
        <div style={{ position:"fixed", inset:0, background:"rgba(15,23,42,0.55)",
                      display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000 }}
             onClick={e => e.target===e.currentTarget && setShowWizard(false)}>
          <div style={{ background:"#fff", borderRadius:12, width:760, maxHeight:"90vh",
                        overflow:"auto", border:"1px solid #e2e8f0" }}>
            <div style={{ padding:"16px 20px", borderBottom:"1px solid #e2e8f0",
                          display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <span style={{ fontSize:14, fontWeight:600 }}>Подключить нового партнёра</span>
              <button onClick={() => setShowWizard(false)}
                      style={{ background:"none", border:"none", cursor:"pointer",
                               fontSize:18, color:"#64748b" }}>×</button>
            </div>
            <LiveWizard onDone={onCompanyAdded} />
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<PortalApp />);

  </script>
</body>
</html>
